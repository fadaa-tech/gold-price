services:
  postgres:
    image: postgres:16-alpine
    container_name: gold-egypt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gold
      POSTGRES_PASSWORD: gold_dev_password
      POSTGRES_DB: gold_egypt
    ports:
      - "5433:5432"
    volumes:
      - gold_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gold -d gold_egypt"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gold_pg_data:
